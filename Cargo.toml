[package]
name = "zpr"
version = "0.10.1"
edition = "2024"
license = "Apache-2.0"

[dependencies]
capnp = { version = "0.25", optional = true }
open-enum = { version = "0.5" }
zerocopy = { version = "0.8", features = ["derive"] }
thiserror = "1.0.65"
url = "2.5.4"
range-set-blaze = { version = "0.5.0" }
ip_network_table-deps-treebitmap = { version = "0.5.0" }
rcu = { path = "../utils/rcu", default-features = false}

[build-dependencies]
capnpc = "0.25"

[features]
default = ["rcu-crossbeam-epoch"]
rcu-aarc = ["rcu/rcu-aarc"]
rcu-arc-swap = ["rcu/rcu-arc-swap"]
rcu-crossbeam-epoch = ["rcu/rcu-crossbeam-epoch"]
rcu-mutex-arc = ["rcu/rcu-mutex-arc"]
rcu-rwlock = ["rcu/rcu-rwlock"]
policy = ["capnp"]
vsapi = ["capnp"]
all = ["policy", "vsapi"]
